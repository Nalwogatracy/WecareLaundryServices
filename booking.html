<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Service - We Care Laundry</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <i class="fas fa-tshirt"></i>
                <span>We Care <span class="highlight">Laundry</span></span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="booking.html" class="active">Book Now</a>
                <a href="track-order.html">Track Order</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="mobile-menu">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <section class="booking-section">
        <div class="container">
            <div class="section-header" data-aos="fade-up">
                <h2>Book a <span class="highlight">Service</span></h2>
                <p>Fill out the form below and we'll pick up your laundry</p>
            </div>

            <div class="booking-container" data-aos="fade-up">
                <form id="bookingForm" class="booking-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Full Name *</label>
                            <input type="text" id="customerName" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Email *</label>
                            <input type="email" id="email" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Phone *</label>
                            <input type="tel" id="phone" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-map-marker-alt"></i> Address *</label>
                            <input type="text" id="address" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-tshirt"></i> Service Type *</label>
                            <select id="serviceType" required>
                                <option value="">Select a service</option>
                                <option value="Wash & Fold">Wash & Fold - $15</option>
                                <option value="Dry Cleaning">Dry Cleaning - $25</option>
                                <option value="Ironing Only">Ironing Only - $10</option>
                                <option value="Home Textiles">Home Textiles - $30</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-weight-hanging"></i> Estimated Weight (kg) *</label>
                            <input type="number" id="weight" min="1" step="0.5" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-calendar"></i> Pickup Date *</label>
                            <input type="date" id="pickupDate" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-clock"></i> Pickup Time *</label>
                            <select id="pickupTime" required>
                                <option value="">Select time</option>
                                <option value="8:00 AM - 10:00 AM">8:00 AM - 10:00 AM</option>
                                <option value="10:00 AM - 12:00 PM">10:00 AM - 12:00 PM</option>
                                <option value="12:00 PM - 2:00 PM">12:00 PM - 2:00 PM</option>
                                <option value="2:00 PM - 4:00 PM">2:00 PM - 4:00 PM</option>
                                <option value="4:00 PM - 6:00 PM">4:00 PM - 6:00 PM</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-pen"></i> Special Instructions</label>
                        <textarea id="instructions" rows="3" placeholder="Any special requests? (e.g., delicate items, stain treatment)"></textarea>
                    </div>

                    <div class="price-preview">
                        <div class="price-info">
                            <span>Estimated Price:</span>
                            <span class="price-amount" id="estimatedPrice">$0.00</span>
                        </div>
                        <div class="price-note">*Final price may vary based on actual weight</div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fas fa-check-circle"></i> Confirm Booking
                    </button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 We Care Laundry Services. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div class="toast-notification" id="toast">
        <div class="toast-icon"><i class="fas fa-bell"></i></div>
        <div class="toast-message"></div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
